<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 384" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="Horizontal bar chart of error types in the bare arm: too few or many skills 5, wrong hit points 3, wrong prepared-spell count 3, wrong cantrip count 2, wrong passive Perception 2, wrong armour class 1, wrong saving throws 1, changed the brief 1.">
  <rect x="0.5" y="0.5" width="719" height="383" rx="16" fill="#ffffff" stroke="#e7e5e4"/>
  <text x="36" y="42" font-size="21" font-weight="700" fill="#292524">Where the from-memory errors come from</text>
  <text x="36" y="66" font-size="13" fill="#78716c">Bare arm · 18 errors across 6 builds · each bar counts how often that mistake occurred</text>

  <!-- rows: label (end at 250), bar from 262, unit = (690-262)/5 = 85.6 px -->
