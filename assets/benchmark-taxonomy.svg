    <text x="250" y="105">too few / many skills</text>
    <text x="250" y="139">wrong hit points</text>
    <text x="250" y="173">wrong prepared-spell count</text>
    <text x="250" y="207">wrong cantrip count</text>
    <text x="250" y="241">wrong passive Perception</text>
    <text x="250" y="275">wrong armour class</text>
    <text x="250" y="309">wrong saving throws</text>
    <text x="250" y="343">changed the fixed brief</text>
  </g>
  <g fill="#E8833B">
    <rect x="262" y="90"  width="428"  height="21" rx="4"/>
    <rect x="262" y="124" width="256.8" height="21" rx="4"/>
    <rect x="262" y="158" width="256.8" height="21" rx="4"/>
    <rect x="262" y="192" width="171.2" height="21" rx="4"/>
    <rect x="262" y="226" width="171.2" height="21" rx="4"/>
    <rect x="262" y="260" width="85.6"  height="21" rx="4"/>
    <rect x="262" y="294" width="85.6"  height="21" rx="4"/>
    <rect x="262" y="328" width="85.6"  height="21" rx="4"/>
  </g>
  <g font-size="13" font-weight="700" fill="#9a5518" text-anchor="start">
    <text x="698" y="106">5</text>
    <text x="526.8" y="140">3</text>
    <text x="526.8" y="174">3</text>
    <text x="441.2" y="208">2</text>
    <text x="441.2" y="242">2</text>
    <text x="355.6" y="276">1</text>
    <text x="355.6" y="310">1</text>
    <text x="355.6" y="344">1</text>
