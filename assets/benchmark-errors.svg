<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="Grouped bar chart of rules errors per created character. Bare (no skill): Haiku 3.5, Sonnet 2.5, Opus 3.0. Grounded (skill): all 0.">
  <rect x="0.5" y="0.5" width="719" height="399" rx="16" fill="#ffffff" stroke="#e7e5e4"/>
  <text x="36" y="42" font-size="21" font-weight="700" fill="#292524">Rules errors per created character</text>
  <text x="36" y="66" font-size="13" fill="#78716c">Lower is better · deterministic scorer · pilot (2 builds, models answering from memory)</text>

  <!-- legend -->
  <rect x="452" y="30" width="13" height="13" rx="3" fill="#E8833B"/>
  <text x="470" y="41" font-size="13" fill="#57534e">bare (no skill)</text>
  <rect x="576" y="30" width="13" height="13" rx="3" fill="#2F6FB0"/>
  <text x="594" y="41" font-size="13" fill="#57534e">grounded (skill)</text>

  <!-- gridlines + y labels (0..4) -->
  <g stroke="#ece9e6" stroke-width="1">
    <line x1="60" y1="340" x2="690" y2="340"/><line x1="60" y1="279" x2="690" y2="279"/>
    <line x1="60" y1="218" x2="690" y2="218"/><line x1="60" y1="157" x2="690" y2="157"/>
    <line x1="60" y1="96" x2="690" y2="96"/>
  </g>
  <g font-size="12" fill="#a8a29e" text-anchor="end">
    <text x="48" y="344">0</text><text x="48" y="283">1</text><text x="48" y="222">2</text>
    <text x="48" y="161">3</text><text x="48" y="100">4</text>
  </g>

  <!-- Haiku (centre 165) -->
  <rect x="105" y="126.5" width="56" height="213.5" rx="4" fill="#E8833B"/>
  <rect x="169" y="337" width="56" height="3" rx="1.5" fill="#2F6FB0"/>
  <text x="133" y="118" font-size="14" font-weight="700" fill="#9a5518" text-anchor="middle">3.5</text>
  <text x="197" y="330" font-size="13" font-weight="700" fill="#2F6FB0" text-anchor="middle">0</text>
  <text x="165" y="362" font-size="13" fill="#44403c" text-anchor="middle">Haiku 4.5</text>

  <!-- Sonnet (centre 375) -->
  <rect x="315" y="187.5" width="56" height="152.5" rx="4" fill="#E8833B"/>
  <rect x="379" y="337" width="56" height="3" rx="1.5" fill="#2F6FB0"/>
  <text x="343" y="179" font-size="14" font-weight="700" fill="#9a5518" text-anchor="middle">2.5</text>
  <text x="407" y="330" font-size="13" font-weight="700" fill="#2F6FB0" text-anchor="middle">0</text>
  <text x="375" y="362" font-size="13" fill="#44403c" text-anchor="middle">Sonnet 5</text>

  <!-- Opus (centre 585) -->
  <rect x="525" y="157" width="56" height="183" rx="4" fill="#E8833B"/>
  <rect x="589" y="337" width="56" height="3" rx="1.5" fill="#2F6FB0"/>
  <text x="553" y="149" font-size="14" font-weight="700" fill="#9a5518" text-anchor="middle">3.0</text>
  <text x="617" y="330" font-size="13" font-weight="700" fill="#2F6FB0" text-anchor="middle">0</text>
  <text x="585" y="362" font-size="13" fill="#44403c" text-anchor="middle">Opus 4.8</text>

  <text x="36" y="388" font-size="11.5" fill="#a8a29e">Grounded outputs are engine-produced (0 by construction). Errors/character, mean of the two builds.</text>
</svg>
