name: test
on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # Do NOT regenerate before checking: prove the committed bundle + adapters
      # are already in sync with docs/ (that is what these guards are for).
      - run: node scripts/check-sync.mjs
      - run: node scripts/check-rule-copies.mjs
      - run: node docs/_engine/html-lint.mjs          # docs/html consistency + link integrity
      - run: node --test "tests/*.test.mjs"
      # Benchmark gates — all OFFLINE (no paid API is ever called in CI):
      - run: node benchmarks/tasks/gen.mjs            # regenerate the corpora deterministically
      - run: node benchmarks/validate.mjs             # JSON-schema validation of tasks + runs
      - run: node benchmarks/runner.mjs --backend oracle --skills dnd-build,dnd-check,dnd-lookup,dnd-help
      - run: node benchmarks/report.mjs --out reports/ci-oracle.md   # report generation on the deterministic run
      # Fabrication guard: the oracle self-consistency run must be perfectly clean, and its rows
      # are labelled provenance=oracle (never a model). Fails the build if either breaks.
      - run: node benchmarks/ci-guard.mjs
