name: test
on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # Do NOT regenerate before checking: prove the committed bundle + adapters
      # are already in sync with docs/ (that is what these guards are for).
      - run: node scripts/check-sync.mjs
      - run: node scripts/check-rule-copies.mjs
      - run: node docs/_engine/html-lint.mjs          # docs/html consistency + link integrity
      - run: node --test "tests/*.test.mjs"
